# Render Blueprint (infra-as-code lite, SDD §29).
services:
  - type: web
    name: gamenight
    plan: free
    region: singapore
    runtime: docker
    dockerfilePath: ./infra/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false   # Neon connection string — set in dashboard, never in git
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false   # e.g. https://gamenight-xbgu.onrender.com  (no trailing slash)
      - key: ADMIN_EMAIL
        sync: false   # your gmail — first login bootstraps as approved admin
